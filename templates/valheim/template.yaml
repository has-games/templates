schema: 1
name: valheim
display_name: Valheim
description: Dedicated Valheim server (lloesche/valheim-server).
image: lloesche/valheim-server
default_tag: latest
min_ram_mb: 4096
ports:
  - { container: 2456, host: 2456, proto: udp }
  - { container: 2457, host: 2457, proto: udp }
env:
  - { key: SERVER_NAME, default: "Has Games Valheim", description: "Public server name" }
  - { key: WORLD_NAME, default: "Dedicated", description: "World/save name" }
# UDP game, no healthcheck — detect readiness from the log lines the server
# prints once the world is loaded and it registers with Steam (joinable).
# (Not "Accepting connection k_EResultOK" — that fires when a *player* connects.)
ready:
  type: log
  pattern: "Opened Steam server|Registering lobby"
# Valheim joins by IP (fixed port), so show only the host IP in connect info.
connect_ip_only: true
